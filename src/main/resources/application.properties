spring.application.name=ai-resume

# LLM via Groq (OpenAI-compatible API). Put real key in application-local.properties (gitignored).
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=${GROQ_API_KEY:placeholder-set-real-key-later}
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.3
# Disable OpenAI auto-config for features Groq doesn't support (audio/image/etc.)
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.image=none
spring.ai.model.moderation=none
spring.ai.model.embedding=none

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3307/ai_resume_analyzer?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Swagger / OpenAPI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Multipart (file upload) limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT (keep real secret in application-local.properties; this is a dev fallback)
app.jwt.secret=${JWT_SECRET:dev-only-please-replace-with-a-base64-encoded-256-bit-secret-string-1234567890abcdef}
app.jwt.expiration-ms=86400000
